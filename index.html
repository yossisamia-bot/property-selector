<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בחירת בית להשקעה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --dark: #0F1117;
    --dark2: #181C27;
    --dark3: #1E2333;
    --text: #E8E8E8;
    --muted: #7A8099;
    --green: #3DD68C;
    --red: #F06060;
    --blue: #5B9CF6;
    --border: rgba(201,168,76,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Heebo',sans-serif; background:var(--dark);
    color:var(--text); min-height:100vh; direction:rtl; padding-bottom:110px;
  }

  /* HEADER */
  header {
    background:var(--dark2); border-bottom:1px solid var(--border);
    padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:50;
  }
  .logo { font-family:'DM Serif Display',serif; font-size:19px; color:var(--gold); }
  .client-badge {
    background:var(--dark3); border:1px solid var(--border);
    border-radius:30px; padding:6px 16px; font-size:13px; color:var(--muted);
  }
  .client-badge span { color:var(--gold); font-weight:700; }

  /* GLOBAL FINANCING CONTROLS */
  .controls {
    max-width:980px; margin:24px auto 0; padding:0 18px;
  }
  .ctrl-box {
    background:var(--dark2); border:1px solid var(--border);
    border-radius:14px; padding:16px 20px;
    display:flex; flex-wrap:wrap; align-items:center; gap:16px;
  }
  .ctrl-title {
    font-size:10px; font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--gold); margin-bottom:0;
    width:100%;
  }
  /* financing input — free field like the old calculator */
  .fin-input-wrap {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .fin-input-label { font-size:13px; color:var(--muted); white-space:nowrap; }
  .fin-input-field {
    display:flex; align-items:center; gap:6px;
    background:var(--dark3); border:1px solid var(--border);
    border-radius:8px; padding:7px 12px;
  }
  .fin-input-field input {
    background:transparent; border:none; outline:none;
    color:var(--text); font-family:'Heebo',sans-serif;
    font-size:16px; font-weight:700; width:52px;
    text-align:center; direction:ltr;
  }
  .fin-input-field input:focus { color:var(--gold); }
  .fin-input-field span { color:var(--muted); font-size:14px; }
  .fin-quick { display:flex; gap:6px; }
  .fin-quick-btn {
    padding:5px 11px; border-radius:6px; border:1px solid var(--border);
    background:transparent; color:var(--muted); font-family:'Heebo',sans-serif;
    font-size:12px; cursor:pointer; transition:all 0.15s;
  }
  .fin-quick-btn:hover { border-color:var(--gold); color:var(--gold); }

  .rate-row {
    display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted);
    width:100%; padding-top:12px; border-top:1px solid var(--border);
  }
  .rate-row input[type=range] { flex:1; max-width:180px; accent-color:var(--gold); cursor:pointer; }
  .rate-val { color:var(--text); font-weight:700; min-width:44px; }
  .rate-row.hidden { display:none; }

  /* INTRO */
  .intro { text-align:center; padding:24px 18px 10px; }
  .intro h1 { font-family:'DM Serif Display',serif; font-size:clamp(22px,3.5vw,34px); margin-bottom:8px; }
  .intro p { color:var(--muted); font-size:14px; max-width:500px; margin:0 auto; line-height:1.7; }

  /* ── NEIGHBORHOOD SECTIONS ── */
  .neighborhoods { max-width:980px; margin:0 auto; padding:18px 18px 0; display:flex; flex-direction:column; gap:32px; }

  .neighborhood {
    background:var(--dark2); border:1px solid var(--border);
    border-radius:18px; overflow:hidden;
  }

  .nbhd-header {
    padding:16px 22px; border-bottom:1px solid var(--border);
    display:flex; flex-direction:column; gap:12px;
  }
  .nbhd-header-top {
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  .nbhd-title-wrap { display:flex; flex-direction:column; gap:3px; }
  .nbhd-name {
    font-family:'DM Serif Display',serif; font-size:20px; color:var(--text);
    display:flex; align-items:center; gap:8px;
  }
  .nbhd-sub { font-size:12px; color:var(--muted); }
  .nbhd-hoa {
    font-size:11px; color:var(--muted);
    background:var(--dark3); border:1px solid var(--border);
    border-radius:20px; padding:4px 12px; white-space:nowrap;
  }
  .nbhd-hoa span { color:var(--text); font-weight:700; }
  .map-area-btn {
    font-size:11px; font-weight:700; color:var(--blue);
    background:rgba(91,156,246,0.08); border:1px solid rgba(91,156,246,0.2);
    border-radius:8px; padding:5px 12px; text-decoration:none;
    transition:all 0.17s; white-space:nowrap;
  }
  .map-area-btn:hover { background:var(--blue); color:var(--dark); }

  /* pros/cons strip per neighborhood */
  .nbhd-pros-cons {
    display:flex; gap:8px; flex-wrap:wrap;
  }
  .nbhd-tag {
    font-size:11px; padding:4px 11px; border-radius:20px;
    display:flex; align-items:center; gap:5px; line-height:1.4;
  }
  .nbhd-tag.pro {
    background:rgba(61,214,140,0.09); border:1px solid rgba(61,214,140,0.2); color:#a8f0cd;
  }
  .nbhd-tag.con {
    background:rgba(240,96,96,0.08); border:1px solid rgba(240,96,96,0.18); color:#f5a5a5;
  }

  /* CARDS WITHIN NEIGHBORHOOD */
  .nbhd-cards {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:0;
  }
  .nbhd-cards .card { border-radius:0; border:none; border-left:1px solid var(--border); }
  .nbhd-cards .card:first-child { border-left:none; }

  /* On mobile stack vertically */
  @media (max-width:600px) {
    .nbhd-cards { grid-template-columns:1fr; }
    .nbhd-cards .card { border-left:none; border-top:1px solid var(--border); }
    .nbhd-cards .card:first-child { border-top:none; }
  }

  /* CARD */
  .card {
    background:transparent; cursor:pointer;
    transition:background 0.2s, box-shadow 0.2s;
    position:relative; display:flex; flex-direction:column;
  }
  .card:hover { background:rgba(201,168,76,0.04); }
  .card.selected { background:rgba(201,168,76,0.07); box-shadow:inset 0 0 0 2px var(--gold); }

  .check-overlay {
    position:absolute; top:10px; left:10px; width:26px; height:26px;
    background:var(--gold); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transform:scale(0.4);
    transition:all 0.26s cubic-bezier(0.34,1.56,0.64,1); z-index:2;
  }
  .card.selected .check-overlay { opacity:1; transform:scale(1); }
  .check-overlay svg { width:12px; height:12px; }

  .card-rec-badge {
    position:absolute; top:10px; right:10px;
    background:var(--green); color:var(--dark);
    font-size:9px; font-weight:900; letter-spacing:1px;
    padding:3px 9px; border-radius:20px; z-index:2; text-transform:uppercase;
  }

  /* card body */
  .card-body { padding:16px; flex:1; display:flex; flex-direction:column; gap:10px; }

  .model-name { font-family:'DM Serif Display',serif; font-size:17px; color:var(--text); }
  .price-range { font-size:13px; font-weight:700; color:var(--gold); }

  /* specs */
  .specs { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
  .spec { background:var(--dark3); border-radius:7px; padding:7px 3px; text-align:center; }
  .spec-val { font-size:13px; font-weight:700; color:var(--text); display:block; }
  .spec-lbl { font-size:9px; color:var(--muted); margin-top:1px; }

  /* rent input */
  .rent-row {
    background:var(--dark3); border-radius:9px; padding:10px 12px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .rent-row label { font-size:11px; color:var(--muted); white-space:nowrap; flex-shrink:0; }
  .rent-input-wrap {
    display:flex; align-items:center; gap:5px;
    background:var(--dark2); border:1px solid var(--border);
    border-radius:7px; padding:5px 9px; flex:1; max-width:120px;
  }
  .rent-input-wrap span { color:var(--gold); font-weight:700; font-size:13px; }
  .rent-input-wrap input {
    background:transparent; border:none; outline:none;
    color:var(--text); font-family:'Heebo',sans-serif;
    font-size:13px; font-weight:700; width:100%; text-align:right; direction:ltr;
  }
  .rent-input-wrap input::placeholder { color:var(--muted); font-weight:400; font-size:12px; }

  /* cashflow — secondary, not the hero */
  .cf-section {
    border-top:1px solid var(--border); padding-top:10px; margin-top:2px;
    display:flex; flex-direction:column; gap:6px;
  }
  .cf-section-title {
    font-size:9px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase;
    color:var(--muted); opacity:0.7;
  }
  .cf-box {
    display:flex; align-items:center; justify-content:space-between;
  }
  .cf-label { font-size:11px; color:var(--muted); }
  .cf-val { font-size:14px; font-weight:700; transition:color 0.2s; }
  .cf-val.green { color:var(--green); opacity:0.85; }
  .cf-val.red   { color:var(--red);   opacity:0.85; }
  .cf-val.empty { color:var(--muted); font-size:11px; font-weight:400; opacity:0.6; }

  /* expense breakdown — subtle */
  .expense-line {
    font-size:10px; color:var(--muted); opacity:0.65; line-height:1.8;
  }
  .expense-line span { color:var(--muted); opacity:0.9; }

  /* mortgage breakdown */
  .mort-breakdown {
    font-size:10px; color:var(--muted); opacity:0.7; line-height:1.9; display:none;
  }
  .mort-breakdown.visible { display:block; }
  .mort-breakdown b { color:var(--text); opacity:0.8; font-weight:600; }

  /* select button — subtle, small */
  .select-btn {
    width:100%; padding:7px; border-radius:8px; border:1px solid var(--border);
    background:transparent; color:var(--muted); font-family:'Heebo',sans-serif;
    font-size:11px; font-weight:500; cursor:pointer; transition:all 0.17s; margin-top:auto;
    letter-spacing:0.3px;
  }
  .select-btn:hover { border-color:var(--gold); color:var(--gold); }
  .card.selected .select-btn { background:var(--gold); color:var(--dark); border-color:var(--gold); font-weight:700; }

  /* rec badge — not over text on mobile */
  .card-rec-badge {
    display:inline-flex; align-items:center; gap:4px;
    background:var(--green); color:var(--dark);
    font-size:9px; font-weight:900; letter-spacing:1px;
    padding:3px 9px; border-radius:20px; text-transform:uppercase;
    margin-bottom:4px; align-self:flex-start;
  }

  /* ── GALLERY ── */
  .gallery {
    display:none; flex-direction:column; gap:0;
    border-top:1px solid var(--border);
    animation: fadeIn 0.2s ease;
  }
  .gallery.open { display:flex; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }

  .gallery-scroll {
    display:flex; overflow-x:auto; gap:0; scroll-snap-type:x mandatory;
    scrollbar-width:none;
  }
  .gallery-scroll::-webkit-scrollbar { display:none; }

  .gallery-img {
    flex:0 0 100%; scroll-snap-align:start;
    height:180px; object-fit:cover; display:block; width:100%;
    background:var(--dark3);
  }
  .gallery-img-placeholder {
    flex:0 0 100%; scroll-snap-align:start; height:180px;
    background:linear-gradient(135deg,var(--dark3),#252a3a);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; color:var(--muted); font-size:12px;
  }
  .gallery-img-placeholder .big { font-size:36px; }

  .gallery-footer {
    padding:10px 14px; display:flex; align-items:center; justify-content:space-between;
    font-size:11px; color:var(--muted); background:var(--dark3);
  }
  .gallery-nav { display:flex; gap:6px; }
  .gallery-nav button {
    background:var(--dark2); border:1px solid var(--border); color:var(--text);
    width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:13px;
    transition:all 0.15s; display:flex; align-items:center; justify-content:center;
  }
  .gallery-nav button:hover { border-color:var(--gold); color:var(--gold); }
  .gallery-counter { font-size:10px; }
  .gallery-link {
    font-size:10px; color:var(--blue); text-decoration:none; font-weight:600;
  }
  .gallery-link:hover { text-decoration:underline; }

  .gallery-toggle-btn {
    font-size:10px; color:var(--muted); background:none; border:none;
    cursor:pointer; font-family:'Heebo',sans-serif; padding:0;
    display:flex; align-items:center; gap:4px; transition:color 0.15s;
  }
  .gallery-toggle-btn:hover { color:var(--gold); }

  /* FOOTER CTA */
  .footer-cta {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--dark2); border-top:1px solid var(--border);
    padding:13px 24px; display:flex; align-items:center; justify-content:center; gap:14px;
    transform:translateY(100%); transition:transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
    z-index:100; flex-wrap:wrap;
  }
  .footer-cta.visible { transform:translateY(0); }
  .footer-cta p { color:var(--muted); font-size:13px; }
  .footer-cta span { color:var(--gold); font-weight:700; }
  .confirm-btn {
    padding:10px 24px; background:var(--gold); color:var(--dark);
    border:none; border-radius:9px; font-family:'Heebo',sans-serif;

  }
  .confirm-btn:hover { background:var(--gold-light); }
</style>

        <span>%</span>
      </div>
      <div class="fin-quick">
        <button class="fin-quick-btn" onclick="setFinTo(0)">0%</button>
        <button class="fin-quick-btn" onclick="setFinTo(50)">50%</button>

    </div>
    <div class="rate-row hidden" id="rateRow">

</div>

  }
];

// ─── GALLERY STATE ─────────────────────────────────────────────────────────
const galleryIndex = {}; // propId → current image index

function toggleGallery(propId, event) {
  event.stopPropagation();
  const el = document.getElementById(`gallery-${propId}`);
  el.classList.toggle('open');
}

function galleryNav(propId, dir, event) {
  event.stopPropagation();
  const prop = ALL_PROPS.find(p => p.id === propId);
  const total = prop.images.length;
  galleryIndex[propId] = ((galleryIndex[propId] || 0) + dir + total) % total;
  const scroll = document.getElementById(`gscroll-${propId}`);
  scroll.scrollTo({ left: galleryIndex[propId] * scroll.offsetWidth, behavior:'smooth' });
  document.getElementById(`gcounter-${propId}`).textContent =
    `${galleryIndex[propId]+1} / ${total}`;
}

// Flatten for easy lookup
const ALL_PROPS = NEIGHBORHOODS.flatMap(n =>
  n.properties.map(p => ({ ...p, neighborhood: n }))
);

// ─── MORTGAGE CALC ────────────────────────────────────────────────────────
// P+I מהיום הראשון — 30 שנה. ככל שיותר שנים משלמים, המשכנתא נעלמת
function monthlyMortgage(principal, rate) {
  if (principal <= 0 || rate <= 0) return 0;
  const r = rate / 12, n = 30 * 12;
  return principal * (r * Math.pow(1+r,n)) / (Math.pow(1+r,n) - 1);
}

// תזרים חודשי ריאלי — רק הוצאות קבועות ובאות לידי ביטוי כל חודש
// vacancy ותחזוקה לא נכלל — אלו ממוצעים לאורך זמן, לא הוצאה חודשית
function calcCashflow(priceVal, rent, finPct, annualRate, hoaAnnual) {
  const loan       = priceVal * finPct;
  const equity     = priceVal - loan;
  const mortgage   = monthlyMortgage(loan, annualRate);          // I.O
  const propTax    = (priceVal * 0.032) / 12;                   // TX 3.2%/שנה
  const insurance  = 1150 / 12;                                  // $1,150/שנה קבוע
  const mgmt       = rent * 0.08;                                // 8% ניהול מהשכירות
  const hoaMonthly = hoaAnnual / 12;
  const totalExp   = mortgage + propTax + insurance + mgmt + hoaMonthly;
  const cashflow   = rent - totalExp;
  return { loan, equity, mortgage, propTax, insurance, mgmt, hoaMonthly, totalExp, cashflow };
}

function priceDisplay(p) { return (p.priceMin + p.priceMax) / 2; }
function fmt(n) {
  const v = Math.round(Math.abs(n));
  return (n < 0 ? '-' : '') + '$' + v.toLocaleString('en-US');
}
function fmtRange(p) {
  return '$' + (p.priceMin/1000).toFixed(0) + 'K – $' + (p.priceMax/1000).toFixed(0) + 'K';
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────
function onFinInput(val) {
  const pct = Math.min(90, Math.max(0, parseFloat(val) || 0));
  finPct = pct / 100;
  document.getElementById('rateRow').classList.toggle('hidden', pct === 0);
  ALL_PROPS.forEach(p => updateCard(p));
}
function setFinTo(pct) {
  document.getElementById('finInput').value = pct;
  onFinInput(pct);
}

function setRate(val) {
  annualRate = parseFloat(val) / 100;
  document.getElementById('rateLabel').textContent = parseFloat(val).toFixed(2) + '%';
  ALL_PROPS.forEach(p => updateCard(p));
}

function onRentInput(id, val) {
  const num = val.trim() === '' ? null : parseFloat(val.replace(/[^0-9.]/g, ''));
  rentState[id] = (num === null || isNaN(num)) ? null : num;
  const prop = ALL_PROPS.find(p => p.id === id);
  updateCard(prop);
}

function updateCard(p) {
  const rent  = rentState[p.id] ?? null;
  const cfEl  = document.getElementById(`cf-${p.id}`);
  const mortEl= document.getElementById(`mort-${p.id}`);
  const expEl = document.getElementById(`exp-${p.id}`);

  if (rent === null || rent <= 0) {
    cfEl.textContent = '—';
    cfEl.className   = 'cf-val empty';
    mortEl.classList.remove('visible');
    if (expEl) expEl.innerHTML = '';
    return;
  }

  const pd  = priceDisplay(p);
  const hoa = p.neighborhood.hoa;
  const { loan, equity, mortgage, propTax, insurance, mgmt, hoaMonthly, cashflow } =
    calcCashflow(pd, rent, finPct, annualRate, hoa);

  cfEl.textContent = (cashflow >= 0 ? '+' : '') + fmt(cashflow) + '/חודש';
  cfEl.className   = 'cf-val ' + (cashflow >= 0 ? 'green' : 'red');

  // פירוט הוצאות
  const parts = [];
  if (finPct > 0) parts.push(`משכנתא (P+I) ${fmt(mortgage)}`);
  parts.push(`מס רכוש ${fmt(propTax)}`);
  parts.push(`ביטוח ${fmt(insurance)}`);
  parts.push(`ניהול 8% ${fmt(mgmt)}`);
  parts.push(`HOA ${fmt(hoaMonthly)}`);
  if (expEl) expEl.innerHTML = parts.join(' · ');

  // הלוואה + הון עצמי
  if (finPct > 0) {
    mortEl.classList.add('visible');
    mortEl.innerHTML = `הלוואה <b>${fmt(loan)}</b> · הון עצמי <b>${fmt(equity)}</b>`;
  } else {
    mortEl.classList.remove('visible');
  }
}

// ─── SELECT ────────────────────────────────────────────────────────────────
function selectCard(propId) {
  selectedId = propId;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  document.getElementById('card-' + propId).classList.add('selected');
  const prop = ALL_PROPS.find(p => p.id === propId);
  document.getElementById('selectedName').textContent =
    `${prop.neighborhood.name} — ${prop.model} (${fmtRange(prop)})`;
  document.getElementById('footerCta').classList.add('visible');
}

function confirmSelection() {
  const prop = ALL_PROPS.find(p => p.id === selectedId);
  const rent = rentState[prop.id] ?? null;
  let cfLine = '';
  if (rent) {
    const { cashflow } = calcCashflow(priceDisplay(prop), rent, finPct, annualRate, prop.neighborhood.hoa);
    cfLine = `\nתזרים מוערך: ${cashflow >= 0 ? '+' : ''}${fmt(cashflow)}/חודש`;
  }
  alert(
    `תודה!\n\n` +
    `שכונה: ${prop.neighborhood.name}\n` +
    `מודל: ${prop.model}\n` +
    `עיר: ${prop.neighborhood.city}\n` +
    `מחיר: ${fmtRange(prop)}` +
    cfLine +
    `\n\nנשלח אליכם את הפרטים המלאים לאישור סופי 🏠`
  );
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function renderAll() {
  const container = document.getElementById('nbhdContainer');
  container.innerHTML = NEIGHBORHOODS.map(n => `
    <div class="neighborhood">
      <div class="nbhd-header">
        <div class="nbhd-header-top">
          <div class="nbhd-title-wrap">
            <div class="nbhd-name">🏘️ ${n.name}</div>
            <div class="nbhd-sub">${n.city}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <div class="nbhd-hoa">HOA: <span>$${n.hoa.toLocaleString()}/שנה</span></div>
            <a class="map-area-btn" href="${n.mapUrl}" target="_blank">📍 מפת האזור</a>
          </div>
        </div>
        <div class="nbhd-pros-cons">
          ${n.pros.map(t => `<div class="nbhd-tag pro">✓ ${t}</div>`).join('')}
          ${n.cons.map(t => `<div class="nbhd-tag con">✗ ${t}</div>`).join('')}
        </div>
      </div>
      <div class="nbhd-cards">
        ${n.properties.map(p => renderCard(p)).join('')}
      </div>
    </div>
  `).join('');
}

function renderCard(p) {
  const floorsLabel = p.floors === 1 ? 'קומה אחת' : '2 קומות';
  const hasImages   = p.images && p.images.length > 0;
  const total       = hasImages ? p.images.length : 0;
  galleryIndex[p.id] = 0;

  const galleryContent = hasImages
    ? p.images.map(src =>
        `<img class="gallery-img" src="${src}" loading="lazy" onerror="this.style.display='none'" />`
      ).join('')
    : `<div class="gallery-img-placeholder">
         <span class="big">🏠</span>
         <span>תמונות יתווספו בקרוב</span>
       </div>`;

  return `
    <div class="card" id="card-${p.id}" onclick="selectCard('${p.id}')">
      <div class="check-overlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0F1117" stroke-width="3"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <!-- GALLERY (hidden by default) -->
      <div class="gallery" id="gallery-${p.id}">
        <div class="gallery-scroll" id="gscroll-${p.id}">
          ${galleryContent}
        </div>
        <div class="gallery-footer">
          <a class="gallery-link" href="${p.lennarUrl}" target="_blank" onclick="event.stopPropagation()">
            פתח בלנאר ↗
          </a>
          <span class="gallery-counter" id="gcounter-${p.id}">1 / ${Math.max(total,1)}</span>
          <div class="gallery-nav">
            <button onclick="galleryNav('${p.id}',-1,event)">‹</button>
            <button onclick="galleryNav('${p.id}',1,event)">›</button>
          </div>
        </div>
      </div>

      <div class="card-body">
        <div>
          ${p.recommended ? `<div class="card-rec-badge">⭐ מומלץ</div>` : ''}
          <div class="model-name">${p.model}</div>
          <div class="price-range">${fmtRange(p)}</div>
        </div>

        <div class="specs">
          <div class="spec"><span class="spec-val">${p.beds}</span><div class="spec-lbl">חדרים</div></div>
          <div class="spec"><span class="spec-val">${p.baths}</span><div class="spec-lbl">שירותים</div></div>
          <div class="spec"><span class="spec-val">${p.sqft.toLocaleString()}</span><div class="spec-lbl">Sq Ft</div></div>
          <div class="spec"><span class="spec-val">${p.garage}</span><div class="spec-lbl">גראז׳</div></div>
        </div>
        <div style="font-size:10px;color:var(--muted);opacity:0.65;margin-top:-4px;">
          ${floorsLabel} · ${p.floors === 1 ? 'גג שטוח, חצר' : 'גג משופע, 2 קומות'}
        </div>

        <div class="rent-row" onclick="event.stopPropagation()">
          <label>שכירות / חודש</label>
          <div class="rent-input-wrap">
            <span>$</span>
            <input type="number" id="rent-input-${p.id}"
                   placeholder="הזינו" min="0"
                   oninput="onRentInput('${p.id}', this.value)" />
          </div>
        </div>

        <div class="cf-section">
          <div class="cf-section-title">תזרים חודשי מוערך</div>
          <div class="cf-box">
            <div class="cf-label">שכירות פחות הוצאות</div>
            <div class="cf-val empty" id="cf-${p.id}">—</div>
          </div>
          <div class="expense-line" id="exp-${p.id}"></div>
          <div class="mort-breakdown" id="mort-${p.id}"></div>
        </div>

        <div style="display:flex;gap:8px;align-items:center;margin-top:auto;">
          <button class="select-btn" style="flex:1;">בחר מודל זה</button>
          <button class="gallery-toggle-btn" onclick="toggleGallery('${p.id}',event)">
            📷 תמונות
          </button>
        </div>
      </div>
    </div>
  `;
}

renderAll();
</script>
</body>
</html>
