<html lang="he" dir="rtl">

<title>בחירת בית להשקעה</title>

<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --dark: #0F1117;
    --dark2: #181C27;
    --dark3: #1E2333;
    --text: #E8E8E8;
    --muted: #7A8099;
    --green: #3DD68C;
    --red: #F06060;
    --blue: #5B9CF6;
    --border: rgba(201,168,76,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Heebo',sans-serif; background:var(--dark);
    color:var(--text); min-height:100vh; direction:rtl; padding-bottom:110px;
  }

  header {
    background:var(--dark2); border-bottom:1px solid var(--border);
    padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:50;
  }
  .logo { font-family:'DM Serif Display',serif; font-size:19px; color:var(--gold); }
  .client-badge {
    background:var(--dark3); border:1px solid var(--border);
    border-radius:30px; padding:6px 16px; font-size:13px; color:var(--muted);
  }
  .client-badge span { color:var(--gold); font-weight:700; }

  .controls { max-width:1200px; margin:24px auto 0; padding:0 18px; }
  .ctrl-box {
    background:var(--dark2); border:1px solid var(--border);
    border-radius:14px; padding:16px 20px;
    display:flex; flex-wrap:wrap; align-items:center; gap:16px;
  }
  .ctrl-title {
    font-size:10px; font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--gold); width:100%;
  }
  .fin-input-wrap { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .fin-input-label { font-size:13px; color:var(--muted); white-space:nowrap; }
  .fin-input-field {
    display:flex; align-items:center; gap:6px;
    background:var(--dark3); border:1px solid var(--border);
    border-radius:8px; padding:7px 12px;
  }
  .fin-input-field input {
    background:transparent; border:none; outline:none;
    color:var(--text); font-family:'Heebo',sans-serif;
    font-size:16px; font-weight:700; width:52px;
    text-align:center; direction:ltr;
  }
  .fin-input-field input:focus { color:var(--gold); }
  .fin-input-field span { color:var(--muted); font-size:14px; }
  .fin-quick { display:flex; gap:6px; }
  .fin-quick-btn {
    padding:5px 11px; border-radius:6px; border:1px solid var(--border);
    background:transparent; color:var(--muted); font-family:'Heebo',sans-serif;
    font-size:12px; cursor:pointer; transition:all 0.15s;
  }
  .fin-quick-btn:hover { border-color:var(--gold); color:var(--gold); }
  .rate-row {
    display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted);
    width:100%; padding-top:12px; border-top:1px solid var(--border);
  }
  .rate-row input[type=range] { flex:1; max-width:180px; accent-color:var(--gold); cursor:pointer; }
  .rate-val { color:var(--text); font-weight:700; min-width:44px; }
  .rate-row.hidden { display:none; }

  .intro { text-align:center; padding:24px 18px 10px; }
  .intro h1 { font-family:'DM Serif Display',serif; font-size:clamp(22px,3.5vw,34px); margin-bottom:8px; }
  .intro p { color:var(--muted); font-size:14px; max-width:500px; margin:0 auto; line-height:1.7; }

  .neighborhoods { max-width:1200px; margin:0 auto; padding:18px 18px 0; display:flex; flex-direction:column; gap:32px; }
  .neighborhood {
    background:var(--dark2); border:1px solid var(--border);
    border-radius:18px; overflow:hidden;
  }
  .nbhd-header {
    padding:16px 22px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  .nbhd-title-wrap { display:flex; flex-direction:column; gap:3px; }
  .nbhd-name {
    font-family:'DM Serif Display',serif; font-size:20px; color:var(--text);
    display:flex; align-items:center; gap:8px;
  }
  .nbhd-sub { font-size:12px; color:var(--muted); }
  .nbhd-badges { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .nbhd-hoa {
    font-size:11px; color:var(--muted);
    background:var(--dark3); border:1px solid var(--border);
    border-radius:20px; padding:4px 12px; white-space:nowrap;
  }
  .nbhd-hoa span { color:var(--text); font-weight:700; }
  .map-area-btn {
    font-size:11px; font-weight:700; color:var(--blue);
    background:rgba(91,156,246,0.08); border:1px solid rgba(91,156,246,0.2);
    border-radius:8px; padding:5px 12px; text-decoration:none;
    transition:all 0.17s; white-space:nowrap;
  }
  .map-area-btn:hover { background:var(--blue); color:var(--dark); }

  .nbhd-cards {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));
    gap:0;
  }
  .nbhd-cards .card { border-radius:0; border:none; border-left:1px solid var(--border); }
  .nbhd-cards .card:first-child { border-left:none; }
  @media (max-width:700px) {
    .nbhd-cards { grid-template-columns:1fr 1fr; }
    .nbhd-cards .card { border-left:none; border-top:1px solid var(--border); }
    .nbhd-cards .card:first-child, .nbhd-cards .card:nth-child(2) { border-top:none; }
    .nbhd-cards .card:nth-child(even) { border-left:1px solid var(--border); }
  }
  @media (max-width:460px) {
    .nbhd-cards { grid-template-columns:1fr; }
    .nbhd-cards .card { border-left:none !important; border-top:1px solid var(--border); }
    .nbhd-cards .card:first-child { border-top:none; }
  }

  .card {
    background:transparent; cursor:pointer;
    transition:background 0.2s;
    position:relative; display:flex; flex-direction:column;
  }
  .card:hover { background:rgba(201,168,76,0.04); }
  .card.selected { background:rgba(201,168,76,0.07); box-shadow:inset 0 0 0 2px var(--gold); }

  .check-overlay {
    position:absolute; top:10px; left:10px; width:26px; height:26px;
    background:var(--gold); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transform:scale(0.4);
    transition:all 0.26s cubic-bezier(0.34,1.56,0.64,1); z-index:2;
  }
  .card.selected .check-overlay { opacity:1; transform:scale(1); }
  .check-overlay svg { width:12px; height:12px; }

  /* IMAGE */
  .card-img {
    width:100%; height:160px; object-fit:cover; display:block;
    background:var(--dark3);
  }
  .card-img-placeholder {
    width:100%; height:120px;
    background:linear-gradient(135deg,var(--dark3),#252a3a);
    display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:11px; gap:6px;
  }

  .card-body { padding:14px; flex:1; display:flex; flex-direction:column; gap:8px; }
  .model-name { font-family:'DM Serif Display',serif; font-size:16px; color:var(--text); }
  .price-range { font-size:13px; font-weight:700; color:var(--gold); }

  .specs { display:flex; gap:6px; flex-wrap:wrap; font-size:11px; color:var(--muted); }
  .spec-tag { background:var(--dark3); border-radius:5px; padding:3px 8px; }

  .cf-row {
    background:var(--dark3); border-radius:9px; padding:10px 12px;
    display:flex; flex-direction:column; gap:6px;
  }
  .cf-rent-line {
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .cf-rent-line label { font-size:11px; color:var(--muted); white-space:nowrap; }
  .rent-input-wrap {
    display:flex; align-items:center; gap:4px;
    background:var(--dark2); border:1px solid var(--border);
    border-radius:7px; padding:4px 8px; max-width:110px;

  .rent-input-wrap span { color:var(--gold); font-weight:700; font-size:13px; }
  .rent-input-wrap input {
    background:transparent; border:none; outline:none;
    color:var(--text); font-family:'Heebo',sans-serif;
    font-size:13px; font-weight:700; width:100%; text-align:right; direction:ltr;

  .cf-result {
    display:flex; align-items:center; justify-content:space-between;
    font-size:12px;
  }
  .cf-result-label { color:var(--muted); }
  .cf-result-val { font-weight:700; font-size:14px; }
  .cf-result-val.green { color:var(--green); }
  .cf-result-val.red { color:var(--red); }

  .expense-line { font-size:9px; color:var(--muted); opacity:0.7; line-height:1.7; }

  .select-btn {
    width:100%; padding:7px; border-radius:8px; border:1px solid var(--border);
    background:transparent; color:var(--muted); font-family:'Heebo',sans-serif;
    font-size:11px; font-weight:500; cursor:pointer; transition:all 0.17s; margin-top:auto;

  .select-btn:hover { border-color:var(--gold); color:var(--gold); }
  .card.selected .select-btn { background:var(--gold); color:var(--dark); border-color:var(--gold); font-weight:700; }

  .lennar-link {
    font-size:10px; color:var(--blue); text-decoration:none; text-align:center; display:block; margin-top:4px;
  }
  .lennar-link:hover { text-decoration:underline; }

  .footer-cta {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--dark2); border-top:1px solid var(--border);
    padding:13px 24px; display:flex; align-items:center; justify-content:center; gap:14px;
    transform:translateY(100%); transition:transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
    z-index:100; flex-wrap:wrap;
  }
  .footer-cta.visible { transform:translateY(0); }
  .footer-cta p { color:var(--muted); font-size:13px; }
  .footer-cta span { color:var(--gold); font-weight:700; }
  .confirm-btn {
    padding:10px 24px; background:var(--gold); color:var(--dark);
    border:none; border-radius:9px; font-family:'Heebo',sans-serif;
    font-size:14px; font-weight:700; cursor:pointer; transition:all 0.17s;
  }
  .confirm-btn:hover { background:var(--gold-light); }

  .rec-badge {
    display:inline-block; background:var(--green); color:var(--dark);
    font-size:9px; font-weight:900; letter-spacing:0.5px;
    padding:2px 8px; border-radius:12px; text-transform:uppercase;
  }
  .note-tag { font-size:9px; color:var(--muted); opacity:0.6; font-style:italic; }
</style>
</head>

        lennarUrl: 'https://www.lennar.com/new-homes/texas/houston/crosby/synova/cottage-collection/whitetail/22615845149',
        recommended: false,
        images: [
          'https://cdn.lennar.com/api/images/contentassets/f57016424c8f49ffa759ecbb4cab36b5/copy-of-copy-of-grove_core_hou_2560_rend_whitetail_h.jpg?w=800',
          'https://cdn.lennar.com/api/images/contentassets/bb8a2056def3497eb3a32f0ca8e276a1/grove_core_2560_rend_whitetail_family_1of3_f1.jpg?w=800',
        ],
        note: 'אין הערכת שכירות — comp בלבד',
      },
      {
        id: 'syn-beckman', model: 'Beckman',
        sqft: 1302, beds: 3, baths: 2, garage: 2, floors: 1,
        priceMin: 175000, priceMax: 195000,
        estRent: 1750, compRent: null,
        lennarUrl: 'https://www.zillow.com/homedetails/1523-Gardenia-Grove-Ln-Crosby-TX-77532/460667246_zpid/',
        recommended: false,
        images: [
          'https://cdn.lennar.com/api/images/contentassets/565d42e668eb45f5b5b33b17a85974c1/copy-of-copy-of-grove_core_hou_3310_rend_beckman_m1_111824.jpg?w=800',
          'https://cdn.lennar.com/api/images/contentassets/d7042ca840b8469c9ca38ff822f25110/grove_core_3310_rend_beckman_kitchen_1of4_f1.jpg?w=800',
        ],
      },
    ]
  }
];

const ALL_PROPS = NEIGHBORHOODS.flatMap(n =>
  n.properties.map(p => ({ ...p, neighborhood: n }))
);

// Auto-fill rent from estimates
ALL_PROPS.forEach(p => {
  rentState[p.id] = p.estRent ?? p.compRent ?? null;
});

function monthlyMortgage(principal, rate) {
  if (principal <= 0 || rate <= 0) return 0;
  const r = rate / 12, n = 30 * 12;
  return principal * (r * Math.pow(1+r,n)) / (Math.pow(1+r,n) - 1);
}

function calcCashflow(priceVal, rent, finPct, annualRate, hoaAnnual) {
  const loan = priceVal * finPct;
  const mortgage = monthlyMortgage(loan, annualRate);
  const propTax = (priceVal * 0.032) / 12;
  const insurance = 1150 / 12;
  const mgmt = rent * 0.08;
  const hoaMonthly = hoaAnnual / 12;
  const totalExp = mortgage + propTax + insurance + mgmt + hoaMonthly;
  return { loan, equity: priceVal - loan, mortgage, propTax, insurance, mgmt, hoaMonthly, totalExp, cashflow: rent - totalExp };
}

function priceDisplay(p) { return (p.priceMin + p.priceMax) / 2; }
function fmt(n) { return (n < 0 ? '-' : '') + '$' + Math.round(Math.abs(n)).toLocaleString('en-US'); }
function fmtRange(p) { return '$' + (p.priceMin/1000).toFixed(0) + 'K–$' + (p.priceMax/1000).toFixed(0) + 'K'; }

function onFinInput(val) {
  const pct = Math.min(90, Math.max(0, parseFloat(val) || 0));
  finPct = pct / 100;
  document.getElementById('rateRow').classList.toggle('hidden', pct === 0);
  ALL_PROPS.forEach(p => updateCard(p));
}
function setFinTo(pct) {
  document.getElementById('finInput').value = pct;
  onFinInput(pct);
}
function setRate(val) {
  annualRate = parseFloat(val) / 100;
  document.getElementById('rateLabel').textContent = parseFloat(val).toFixed(2) + '%';
  ALL_PROPS.forEach(p => updateCard(p));
}

function onRentInput(id, val) {
  const num = val.trim() === '' ? null : parseFloat(val.replace(/[^0-9.]/g, ''));
  rentState[id] = (num === null || isNaN(num)) ? null : num;
  updateCard(ALL_PROPS.find(p => p.id === id));
}

function updateCard(p) {
  const rent = rentState[p.id] ?? null;
  const cfEl = document.getElementById(`cf-${p.id}`);
  const expEl = document.getElementById(`exp-${p.id}`);
  if (!cfEl) return;

  if (rent === null || rent <= 0) {
    cfEl.textContent = '—';
    cfEl.className = 'cf-result-val';
    if (expEl) expEl.innerHTML = '';
    return;
  }

  const pd = priceDisplay(p);
  const hoa = p.neighborhood.hoa;
  const { mortgage, propTax, insurance, mgmt, hoaMonthly, cashflow } =
    calcCashflow(pd, rent, finPct, annualRate, hoa);

  cfEl.textContent = (cashflow >= 0 ? '+' : '') + fmt(cashflow);
  cfEl.className = 'cf-result-val ' + (cashflow >= 0 ? 'green' : 'red');

  const parts = [];
  if (finPct > 0) parts.push(`P+I ${fmt(mortgage)}`);
  parts.push(`מס ${fmt(propTax)}`);
  parts.push(`ביטוח ${fmt(insurance)}`);
  parts.push(`ניהול ${fmt(mgmt)}`);
  parts.push(`HOA ${fmt(hoaMonthly)}`);
  if (expEl) expEl.innerHTML = parts.join(' · ');
}

function selectCard(propId) {
  selectedId = propId;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  document.getElementById('card-' + propId).classList.add('selected');
  const prop = ALL_PROPS.find(p => p.id === propId);
  document.getElementById('selectedName').textContent =
    `${prop.neighborhood.name} — ${prop.model} (${fmtRange(prop)})`;
  document.getElementById('footerCta').classList.add('visible');
}

function confirmSelection() {
  const prop = ALL_PROPS.find(p => p.id === selectedId);
  const rent = rentState[prop.id] ?? null;
  let cfLine = '';
  if (rent) {
    const { cashflow } = calcCashflow(priceDisplay(prop), rent, finPct, annualRate, prop.neighborhood.hoa);
    cfLine = `\nתזרים מוערך: ${cashflow >= 0 ? '+' : ''}${fmt(cashflow)}/חודש`;
  }
  alert(
    `שכונה: ${prop.neighborhood.name}\n` +
    `מודל: ${prop.model}\n` +
    `עיר: ${prop.neighborhood.city}\n` +
    `מחיר: ${fmtRange(prop)}` +
    cfLine +
    `\n\nנשלח פרטים מלאים לאישור סופי`
  );
}

function renderAll() {
  const container = document.getElementById('nbhdContainer');
  container.innerHTML = NEIGHBORHOODS.map(n => `
    <div class="neighborhood">
      <div class="nbhd-header">
        <div class="nbhd-title-wrap">
          <div class="nbhd-name">${n.name}</div>
          <div class="nbhd-sub">${n.city} · ${n.properties.length} מודלים</div>
        </div>
        <div class="nbhd-badges">
          <div class="nbhd-hoa">HOA: <span>$${n.hoa.toLocaleString()}/שנה</span></div>
          <a class="map-area-btn" href="${n.mapUrl}" target="_blank">מפה</a>
        </div>
      </div>
      <div class="nbhd-cards">
        ${n.properties.map(p => renderCard(p, n)).join('')}
      </div>
    </div>
  `).join('');

  ALL_PROPS.forEach(p => updateCard(p));
}

function renderCard(p, n) {
  const floorsLabel = p.floors === 1 ? 'קומה 1' : '2 קומות';
  const initRent = rentState[p.id] ?? '';
  const compLine = p.compRent ? `comp: $${p.compRent.toLocaleString()}` : '';

  const hasImages = p.images && p.images.length > 0;
  const imgHtml = hasImages
    ? `<img class="card-img" src="${p.images[0]}" loading="lazy" onerror="this.outerHTML='<div class=card-img-placeholder>תמונה לא זמינה</div>'" />`
    : `<div class="card-img-placeholder">תמונות בקרוב</div>`;

  return `
    <div class="card" id="card-${p.id}" onclick="selectCard('${p.id}')">
      <div class="check-overlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0F1117" stroke-width="3"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      ${imgHtml}
      <div class="card-body">
        <div>
          ${p.recommended ? '<span class="rec-badge">מומלץ</span>' : ''}
          <div class="model-name">${p.model}</div>
          <div class="price-range">${fmtRange(p)}</div>
        </div>
        <div class="specs">
          <span class="spec-tag">${p.beds} חד׳</span>
          <span class="spec-tag">${p.baths} שירותים</span>
          <span class="spec-tag">${p.sqft.toLocaleString()} sqft</span>
          <span class="spec-tag">${p.garage} גראז׳</span>
          <span class="spec-tag">${floorsLabel}</span>
        </div>
        ${p.note ? `<div class="note-tag">${p.note}</div>` : ''}

        <div class="cf-row" onclick="event.stopPropagation()">
          <div class="cf-rent-line">
            <label>שכירות${compLine ? ' <span style="opacity:0.5;font-size:9px">(' + compLine + ')</span>' : ''}</label>
            <div class="rent-input-wrap">
              <span>$</span>
              <input type="number" value="${initRent}" min="0"
                     oninput="onRentInput('${p.id}', this.value)" />
            </div>
          </div>
          <div class="cf-result">
            <span class="cf-result-label">תזרים חודשי</span>
            <span class="cf-result-val" id="cf-${p.id}">—</span>
          </div>
          <div class="expense-line" id="exp-${p.id}"></div>
        </div>

        <button class="select-btn">בחר מודל זה</button>
        <a class="lennar-link" href="${p.lennarUrl}" target="_blank" onclick="event.stopPropagation()">צפה בלנאר</a>
      </div>
    </div>
  `;
}

renderAll();
</script>
</body>
</html>
