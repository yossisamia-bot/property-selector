<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בחירת בית להשקעה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --dark: #0F1117;
    --dark2: #181C27;
    --dark3: #1E2333;
    --text: #E8E8E8;
    --muted: #7A8099;
    --green: #3DD68C;
    --red: #F06060;
    --blue: #5B9CF6;
    --border: rgba(201,168,76,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Heebo',sans-serif; background:var(--dark);
    color:var(--text); min-height:100vh; direction:rtl; padding-bottom:110px;
  }

  header {
    background:var(--dark2); border-bottom:1px solid var(--border);
    padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:50;
  }
  .logo { font-family:'DM Serif Display',serif; font-size:19px; color:var(--gold); }
  .client-badge {
    background:var(--dark3); border:1px solid var(--border);
    border-radius:30px; padding:6px 16px; font-size:13px; color:var(--muted);
  }
  .client-badge span { color:var(--gold); font-weight:700; }

  .controls { max-width:1200px; margin:8px auto 0; padding:0 18px; }
  .ctrl-box {
    background:var(--dark2); border:1px solid var(--border);
    border-radius:10px; padding:10px 16px;
    display:flex; flex-wrap:wrap; align-items:center; gap:10px;
  }
  .ctrl-title {
    font-size:9px; font-weight:700; letter-spacing:1.2px;
    text-transform:uppercase; color:var(--gold);
  }
  .fin-input-wrap { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .fin-input-label { font-size:13px; color:var(--muted); white-space:nowrap; }
  .fin-input-field {
    display:flex; align-items:center; gap:6px;
    background:var(--dark3); border:1px solid var(--border);
    border-radius:8px; padding:7px 12px;
  }
  .fin-input-field input {
    background:transparent; border:none; outline:none;
    color:var(--text); font-family:'Heebo',sans-serif;
    font-size:16px; font-weight:700; width:52px;
    text-align:center; direction:ltr;
  }
  .fin-input-field input:focus { color:var(--gold); }
  .fin-input-field span { color:var(--muted); font-size:14px; }
  .fin-quick { display:flex; gap:6px; }
  .fin-quick-btn {
    padding:5px 11px; border-radius:6px; border:1px solid var(--border);
    background:transparent; color:var(--muted); font-family:'Heebo',sans-serif;
    font-size:12px; cursor:pointer; transition:all 0.15s;
  }
  .fin-quick-btn:hover { border-color:var(--gold); color:var(--gold); }
  .rate-row {
    display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted);
    width:100%; padding-top:12px; border-top:1px solid var(--border);
  }
  .rate-row input[type=range] { flex:1; max-width:180px; accent-color:var(--gold); cursor:pointer; }
  .rate-val { color:var(--text); font-weight:700; min-width:44px; }
  .rate-row.hidden { display:none; }

  .intro { text-align:center; padding:10px 18px 0; }
  .intro h1 { font-family:'DM Serif Display',serif; font-size:20px; margin-bottom:0; }
  .intro p { display:none; }

  .neighborhoods { max-width:1200px; margin:0 auto; padding:10px 18px 0; display:flex; flex-direction:column; gap:20px; }
  .neighborhood {
    background:var(--dark2); border:1px solid var(--border);
    border-radius:18px; overflow:hidden;
  }
  .nbhd-header {
    padding:16px 22px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  .nbhd-title-wrap { display:flex; flex-direction:column; gap:3px; }
  .nbhd-name {
    font-family:'DM Serif Display',serif; font-size:20px; color:var(--text);
    display:flex; align-items:center; gap:8px;
  }
  .nbhd-sub { font-size:12px; color:var(--muted); }
  .nbhd-badges { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .nbhd-hoa {
    font-size:11px; color:var(--muted);
    background:var(--dark3); border:1px solid var(--border);
    border-radius:20px; padding:4px 12px; white-space:nowrap;
  }
  .nbhd-hoa span { color:var(--text); font-weight:700; }
  .map-area-btn {
    font-size:11px; font-weight:700; color:var(--blue);
    background:rgba(91,156,246,0.08); border:1px solid rgba(91,156,246,0.2);
    border-radius:8px; padding:5px 12px; text-decoration:none;
    transition:all 0.17s; white-space:nowrap;
  }
  .map-area-btn:hover { background:var(--blue); color:var(--dark); }

  .nbhd-cards {
    display:flex;
    flex-wrap:wrap;
  }
  .nbhd-cards .card {
    flex:1 1 180px;
    min-width:180px;
  }
  .nbhd-cards .card { border-radius:0; border:none; border-left:1px solid var(--border); }
  .nbhd-cards .card:first-child { border-left:none; }
  @media (max-width:700px) {
    .nbhd-cards .card { flex:1 1 45%; min-width:45%; border-left:none; border-top:1px solid var(--border); }
    .nbhd-cards .card:first-child, .nbhd-cards .card:nth-child(2) { border-top:none; }
    #map { height:160px; }
    header { padding:10px 16px; }
    .logo { font-size:16px; }
    .client-badge { font-size:11px; padding:4px 12px; }
    .ctrl-box { padding:8px 12px; gap:8px; }
    .nbhd-header { padding:12px 14px; }
  }
  @media (max-width:460px) {
    .nbhd-cards .card { flex:1 1 100%; min-width:100%; border-left:none !important; border-top:1px solid var(--border); }
    .nbhd-cards .card:first-child { border-top:none; }
    #map { height:140px; }
    .intro h1 { font-size:17px; }
    .card-img, .card-img-placeholder { height:140px; }
    .fin-quick-btn { padding:4px 8px; font-size:11px; }
  }

  .card {
    background:transparent; cursor:pointer;
    transition:background 0.2s;
    position:relative; display:flex; flex-direction:column;
  }
  .card:hover { background:rgba(201,168,76,0.04); }
  .card.selected { background:rgba(201,168,76,0.07); box-shadow:inset 0 0 0 2px var(--gold); }

  .check-overlay {
    position:absolute; top:10px; left:10px; width:26px; height:26px;
    background:var(--gold); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transform:scale(0.4);
    transition:all 0.26s cubic-bezier(0.34,1.56,0.64,1); z-index:2;
  }
  .card.selected .check-overlay { opacity:1; transform:scale(1); }
  .check-overlay svg { width:12px; height:12px; }


  /* IMAGE CAROUSEL */
  .card-carousel {
    position:relative; width:100%; height:160px; overflow:hidden;
    background:var(--dark3);
  }
  .card-carousel img {
    position:absolute; top:0; left:0; width:100%; height:100%;
    object-fit:cover; opacity:0; transition:opacity 0.35s ease;
  }
  .card-carousel img.active { opacity:1; }
  .carousel-dots {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    display:flex; gap:6px; z-index:3;
  }
  .carousel-dot {
    width:8px; height:8px; border-radius:50%;
    background:rgba(255,255,255,0.35); border:1px solid rgba(255,255,255,0.5);
    cursor:pointer; transition:all 0.2s; padding:0;
  }
  .carousel-dot.active {
    background:var(--gold); border-color:var(--gold);
    transform:scale(1.2);
  }
  .carousel-nav {
    position:absolute; top:50%; transform:translateY(-50%);
    background:rgba(0,0,0,0.4); color:#fff; border:none;
    width:28px; height:28px; border-radius:50%; cursor:pointer;
    font-size:14px; display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity 0.2s; z-index:3;
    font-family:sans-serif; padding:0;
  }
  .card-carousel:hover .carousel-nav { opacity:1; }
  .carousel-nav.prev { left:6px; }
  .carousel-nav.next { right:6px; }
  .carousel-nav:hover { background:rgba(0,0,0,0.7); }

  /* IMAGE */
  .card-img {
    width:100%; height:160px; object-fit:cover; display:block;
    background:var(--dark3);
  }
  .card-img-placeholder {
    width:100%; height:120px;
    background:linear-gradient(135deg,var(--dark3),#252a3a);
    display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:11px; gap:6px;
  }

  .card-body { padding:14px; flex:1; display:flex; flex-direction:column; gap:8px; }
  .model-name { font-family:'DM Serif Display',serif; font-size:16px; color:var(--text); }
  .price-range { font-size:13px; font-weight:700; color:var(--gold); }

  .specs { display:flex; gap:6px; flex-wrap:wrap; font-size:11px; color:var(--muted); }
  .spec-tag { background:var(--dark3); border-radius:5px; padding:3px 8px; }

  .cf-row {
    background:var(--dark3); border-radius:9px; padding:10px 12px;
    display:flex; flex-direction:column; gap:6px;
  }
  .cf-rent-line {
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .cf-rent-line label { font-size:11px; color:var(--muted); white-space:nowrap; }
  .rent-input-wrap {
    display:flex; align-items:center; gap:4px;
    background:var(--dark2); border:1px solid var(--border);
    border-radius:7px; padding:4px 8px; max-width:110px;
  }
  .rent-input-wrap span { color:var(--gold); font-weight:700; font-size:13px; }
  .rent-input-wrap input {
    background:transparent; border:none; outline:none;
    color:var(--text); font-family:'Heebo',sans-serif;
    font-size:13px; font-weight:700; width:100%; text-align:right; direction:ltr;
  }
  .cf-result {
    display:flex; align-items:center; justify-content:space-between;
    font-size:12px;
  }
  .cf-result-label { color:var(--muted); }
  .cf-result-val { font-weight:700; font-size:14px; }
  .cf-result-val.green { color:var(--green); }
  .cf-result-val.red { color:var(--red); }

  .expense-toggle {
    display:flex; align-items:center; gap:4px; cursor:pointer;
    font-size:10px; color:var(--muted); opacity:0.6;
    transition:opacity 0.15s; user-select:none;
    border:none; background:none; font-family:'Heebo',sans-serif;
    padding:0;
  }
  .expense-toggle:hover { opacity:1; color:var(--gold); }
  .expense-toggle .icon {
    width:14px; height:14px; border-radius:50%;
    border:1px solid var(--border); display:flex;
    align-items:center; justify-content:center;
    font-size:10px; line-height:1; transition:all 0.2s;
  }
  .expense-toggle.open .icon { transform:rotate(45deg); border-color:var(--gold); color:var(--gold); }
  .expense-detail {
    display:none; font-size:9px; color:var(--muted); opacity:0.7;
    line-height:1.9; padding-top:4px;
  }
  .expense-detail.open { display:block; }
  .expense-detail div { display:flex; justify-content:space-between; }
  .expense-detail span { color:var(--text); opacity:0.8; }

  .select-btn {
    width:100%; padding:7px; border-radius:8px; border:1px solid var(--border);
    background:transparent; color:var(--muted); font-family:'Heebo',sans-serif;
    font-size:11px; font-weight:500; cursor:pointer; transition:all 0.17s; margin-top:auto;
  }
  .select-btn:hover { border-color:var(--gold); color:var(--gold); }
  .card.selected .select-btn { background:var(--gold); color:var(--dark); border-color:var(--gold); font-weight:700; }

  .card-links { display: flex; gap: 6px; }
  .floorplan-link { background: #1a2744 !important; }
  .lennar-link {
    font-size:10px; color:var(--blue); text-decoration:none; text-align:center; display:block; margin-top:4px;
  }
  .lennar-link:hover { text-decoration:underline; }

  .footer-cta {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--dark2); border-top:1px solid var(--border);
    padding:13px 24px; display:flex; align-items:center; justify-content:center; gap:14px;
    transform:translateY(100%); transition:transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
    z-index:100; flex-wrap:wrap;
  }
  .footer-cta.visible { transform:translateY(0); }
  .footer-cta p { color:var(--muted); font-size:13px; }
  .footer-cta span { color:var(--gold); font-weight:700; }
  .confirm-btn {
    padding:10px 24px; background:var(--gold); color:var(--dark);
    border:none; border-radius:9px; font-family:'Heebo',sans-serif;
    font-size:14px; font-weight:700; cursor:pointer; transition:all 0.17s;
  }
  .confirm-btn:hover { background:var(--gold-light); }

  .rec-badge {
    display:inline-block; background:var(--green); color:var(--dark);
    font-size:9px; font-weight:900; letter-spacing:0.5px;
    padding:2px 8px; border-radius:12px; text-transform:uppercase;
  }
  .note-tag { font-size:9px; color:var(--muted); opacity:0.6; font-style:italic; }

  /* MAP */
  .map-wrap {
    max-width:1200px; margin:8px auto 0; padding:0 18px;
    transition:all 0.4s ease;
  }
  .map-container {
    border-radius:14px; overflow:hidden; border:1px solid var(--border);
    position:relative;
  }
  #map {
    height:200px;
    transition:height 0.4s ease;
  }
  #map.collapsed { height:0; }
  .map-strip {
    display:none;
    background:var(--dark2); border:1px solid var(--border);
    border-radius:10px; padding:8px 16px;
    align-items:center; justify-content:space-between;
    max-width:1200px; margin:18px auto 0; padding-left:18px; padding-right:18px;
  }
  .map-strip.visible { display:flex; }
  .map-strip-info {
    font-size:13px; color:var(--text);
    display:flex; align-items:center; gap:8px;
  }
  .map-strip-info .dot {
    width:10px; height:10px; border-radius:50%; background:var(--gold);
  }
  .map-strip-btn {
    font-size:11px; color:var(--blue); background:none; border:1px solid rgba(91,156,246,0.2);
    border-radius:6px; padding:4px 12px; cursor:pointer; font-family:'Heebo',sans-serif;
    transition:all 0.15s;
  }
  .map-strip-btn:hover { background:var(--blue); color:var(--dark); }

  /* Leaflet zoom controls */
  .leaflet-control-zoom a {
    background:var(--dark2) !important;
    color:var(--gold) !important;
    border-color:var(--border) !important;
    width:30px !important; height:30px !important;
    line-height:30px !important; font-size:16px !important;
  }
  .leaflet-control-zoom a:hover {
    background:var(--dark3) !important;
    color:var(--gold-light) !important;
  }
  .leaflet-control-zoom { border:none !important; border-radius:8px !important; overflow:hidden; }

  /* Leaflet popup override */
  .leaflet-popup-content-wrapper {
    background:var(--dark2) !important;
    color:var(--text) !important;
    border:1px solid var(--border) !important;
    border-radius:10px !important;
    font-family:'Heebo',sans-serif !important;
  }
  .leaflet-popup-tip { background:var(--dark2) !important; }
  .leaflet-popup-content { font-size:13px !important; }
  .nbhd-popup-btn {
    display:block; margin-top:6px; padding:5px 12px;
    background:var(--gold); color:var(--dark); border:none; border-radius:6px;
    font-family:'Heebo',sans-serif; font-size:12px; font-weight:700;
    cursor:pointer; width:100%; text-align:center;
  }
</style>
</head>

<div class="map-wrap" id="mapWrap">

function monthlyMortgage(principal, rate) {
  if (principal <= 0 || rate <= 0) return 0;
  const r = rate / 12, n = 30 * 12;
  return principal * (r * Math.pow(1+r,n)) / (Math.pow(1+r,n) - 1);
}

function calcCashflow(priceVal, rent, finPct, annualRate, hoaAnnual) {
  const loan = priceVal * finPct;
  const mortgage = monthlyMortgage(loan, annualRate);
  const propTax = (priceVal * 0.032) / 12;
  const insurance = 1150 / 12;
  const mgmt = rent * 0.08;
  const hoaMonthly = hoaAnnual / 12;
  const totalExp = mortgage + propTax + insurance + mgmt + hoaMonthly;
  return { loan, equity: priceVal - loan, mortgage, propTax, insurance, mgmt, hoaMonthly, totalExp, cashflow: rent - totalExp };
}

function priceDisplay(p) { return (p.priceMin + p.priceMax) / 2; }

function fmtRange(p) { return '$' + (p.priceMin/1000).toFixed(0) + 'K–$' + (p.priceMax/1000).toFixed(0) + 'K'; }

  if (hasImages && p.images.length > 1) {
    const imgs = p.images.map((src, i) =>
      `<img src="${src}" loading="lazy" class="${i === 0 ? 'active' : ''}" onerror="this.style.display='none'" />`

    const dots = p.images.map((_, i) =>
      `<button class="carousel-dot ${i === 0 ? 'active' : ''}" onclick="event.stopPropagation();goSlide('${p.id}',${i})" aria-label="image ${i+1}"></button>`

    imgHtml = `<div class="card-carousel" id="carousel-${p.id}">

      <button class="carousel-nav prev" onclick="event.stopPropagation();stepSlide('${p.id}',-1)">&lsaquo;</button>

    imgHtml = `<img class="card-img" src="${p.images[0]}" loading="lazy" onerror="this.outerHTML='<div class=card-img-placeholder>no image</div>'" />`;
  } else {
    imgHtml = `<div class="card-img-placeholder">no images yet</div>`;
  }

  return `
    <div class="card" id="card-${p.id}" onclick="selectCard('${p.id}')">
      <div class="check-overlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0F1117" stroke-width="3"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>

      </div>

      <div class="card-body">
        <div>
          ${p.recommended ? '<span class="rec-badge">מומלץ</span>' : ''}

// ─── CAROUSEL FUNCTIONS ─────────────────────────────────────────────────
const carouselState = {};

function goSlide(propId, idx) {
  const carousel = document.getElementById('carousel-' + propId);
  if (!carousel) return;
  const imgs = carousel.querySelectorAll('img');
  const dots = carousel.querySelectorAll('.carousel-dot');
  const safeIdx = ((idx % imgs.length) + imgs.length) % imgs.length;
  imgs.forEach((img, i) => img.classList.toggle('active', i === safeIdx));
  dots.forEach((dot, i) => dot.classList.toggle('active', i === safeIdx));
  carouselState[propId] = safeIdx;
}

function stepSlide(propId, dir) {
  const current = carouselState[propId] || 0;
  const carousel = document.getElementById('carousel-' + propId);
  if (!carousel) return;
  const count = carousel.querySelectorAll('img').length;
  goSlide(propId, current + dir);
}

// Touch swipe support for carousels
document.addEventListener('touchstart', function(e) {
  const carousel = e.target.closest('.card-carousel');
  if (!carousel) return;
  carousel._touchX = e.touches[0].clientX;
}, { passive: true });
document.addEventListener('touchend', function(e) {
  const carousel = e.target.closest('.card-carousel');
  if (!carousel || !carousel._touchX) return;
  const diff = carousel._touchX - e.changedTouches[0].clientX;
  const propId = carousel.id.replace('carousel-', '');
  if (Math.abs(diff) > 40) {
    stepSlide(propId, diff > 0 ? 1 : -1);
  }
  carousel._touchX = null;
});
